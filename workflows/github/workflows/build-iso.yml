name: Build ISO
on: { workflow_dispatch: {} }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            isolinux syslinux-common
      - name: Build ISO
        working-directory: live-build
        run: |
          sudo ./auto/config
          sudo lb build
          ls -lah live-image-*.hybrid.iso
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-like-debian-iso
          path: live-build/live-image-*.hybrid.iso
